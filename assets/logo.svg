<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72" role="img" aria-label="Apex Resilient Flooring">
  <defs>
    <linearGradient id="apexBlueLk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a78c0"/>
      <stop offset="0.55" stop-color="#1d4e89"/>
      <stop offset="1" stop-color="#143a68"/>
    </linearGradient>
    <linearGradient id="apexGlossLk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apexGoldLk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f9be4b"/>
      <stop offset="1" stop-color="#e59712"/>
    </linearGradient>
    <filter id="softShadowLk" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.1" stdDeviation="1.1" flood-color="#0c2540" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- mark -->
  <g transform="translate(4,4)">
    <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#apexBlueLk)"/>
    <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#apexGlossLk)"/>
    <rect x="1.6" y="1.6" width="60.8" height="60.8" rx="13.4" fill="none"
          stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.1"/>
    <g stroke-linecap="round">
      <line x1="19" y1="45.5" x2="45" y2="45.5" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.2"/>
      <line x1="16.5" y1="50" x2="47.5" y2="50" stroke="#ffffff" stroke-opacity="0.75" stroke-width="2.6"/>
      <line x1="14" y1="54.5" x2="50" y2="54.5" stroke="url(#apexGoldLk)" stroke-width="3.4"/>
    </g>
    <g filter="url(#softShadowLk)">
      <path d="M17 41.5 L32 15.5 L47 41.5" fill="none" stroke="#ffffff" stroke-width="5.6"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="24.6" y1="34" x2="39.4" y2="34" stroke="url(#apexGoldLk)" stroke-width="5.2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="82" y="34" font-size="22" font-weight="800" fill="#22292f" letter-spacing="-0.4">Apex Resilient</text>
    <text x="83" y="53" font-size="11" font-weight="600" fill="#64748b" letter-spacing="2.4">FLOORING — GTA</text>
  </g>
</svg>
